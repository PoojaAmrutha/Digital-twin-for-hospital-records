# ============================================================================
# DOCKER & DEPLOYMENT CONFIGURATION
# ============================================================================

# ============================================================================
# 1. docker-compose.yml - Complete Stack Setup
# ============================================================================
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: healthwatch_postgres
    environment:
      POSTGRES_USER: healthwatch_user
      POSTGRES_PASSWORD: healthwatch_pass
      POSTGRES_DB: healthwatch_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - healthwatch_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthwatch_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: healthwatch_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - healthwatch_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthwatch_backend
    environment:
      DATABASE_URL: postgresql://healthwatch_user:healthwatch_pass@postgres:5432/healthwatch_db
      REDIS_URL: redis://redis:6379
      SECRET_KEY: your-secret-key-change-in-production
      ALERT_THRESHOLD_HR_LOW: 40
      ALERT_THRESHOLD_HR_HIGH: 130
      ALERT_THRESHOLD_SPO2_LOW: 88
      ALERT_THRESHOLD_TEMP_HIGH: 38.5
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - healthwatch_network
    volumes:
      - ./backend:/app
      - ./models:/app/models
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # React Frontend (Optional - can also run separately)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthwatch_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - healthwatch_network
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # Data Simulator (Optional - run when needed)
  simulator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthwatch_simulator
    environment:
      DATABASE_URL: postgresql://healthwatch_user:healthwatch_pass@postgres:5432/healthwatch_db
      API_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - healthwatch_network
    command: python run_simulation.py --mode simulate --user_id 1 --duration 120
    profiles:
      - simulation  # Only start with: docker-compose --profile simulation up

networks:
  healthwatch_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:


# ============================================================================
# 2. backend/Dockerfile - Backend Container
# ============================================================================
# File: backend/Dockerfile

FROM python:3.11-slim

WORKDIR /app

# Install system dependencies
RUN apt-get update && apt-get install -y \
    postgresql-client \
    && rm -rf /var/lib/apt/lists/*

# Copy requirements
COPY requirements.txt .

# Install Python dependencies
RUN pip install --no-cache-dir -r requirements.txt

# Copy application code
COPY . .

# Create models directory
RUN mkdir -p models

# Expose port
EXPOSE 8000

# Health check
HEALTHCHECK --interval=30s --timeout=10s --start-period=5s --retries=3 \
  CMD python -c "import requests; requests.get('http://localhost:8000/')"

# Run application
CMD ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]


# ============================================================================
# 3. frontend/Dockerfile - Frontend Container (if using separate container)
# ============================================================================
# File: frontend/Dockerfile

FROM node:18-alpine

WORKDIR /app

# Copy package files
COPY package*.json ./

# Install dependencies
RUN npm install

# Copy application code
COPY . .

# Expose port
EXPOSE 3000

# Start development server
CMD ["npm", "start"]


# ============================================================================
# 4. .dockerignore - Exclude unnecessary files
# ============================================================================
