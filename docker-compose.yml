"""
# 🏥 HealthWatch AI - Complete Health Monitoring System

## 🚀 Quick Start (Docker - Recommended)

### Prerequisites
- Docker & Docker Compose installed
- 4GB RAM minimum
- 10GB disk space

### Setup & Run

1. **Clone and Navigate**
```bash
git clone <your-repo>
cd healthwatch-ai
```

2. **Start Everything**
```bash
make build    # Build containers
make up       # Start all services
make db-init  # Initialize database
make train    # Train ML models
```

3. **Access Applications**
- Frontend: http://localhost:3000
- Backend API: http://localhost:8000
- API Documentation: http://localhost:8000/docs
- PostgreSQL: localhost:5432
- Redis: localhost:6379

4. **Run Simulation**
```bash
make simulate
```

## 📦 Manual Setup (Without Docker)

### 1. Database Setup

**Install PostgreSQL:**
```bash
# Ubuntu/Debian
sudo apt-get install postgresql postgresql-contrib

# macOS
brew install postgresql
```

**Create Database:**
```bash
sudo -u postgres psql
CREATE DATABASE healthwatch_db;
CREATE USER healthwatch_user WITH PASSWORD 'healthwatch_pass';
GRANT ALL PRIVILEGES ON DATABASE healthwatch_db TO healthwatch_user;
\q
```

### 2. Redis Setup

```bash
# Ubuntu/Debian
sudo apt-get install redis-server

# macOS
brew install redis

# Start Redis
redis-server
```

### 3. Backend Setup

```bash
cd backend

# Create virtual environment
python -m venv venv
source venv/bin/activate  # On Windows: venv\Scripts\activate

# Install dependencies
pip install -r requirements.txt

# Create .env file
cat > .env << EOF
DATABASE_URL=postgresql://healthwatch_user:healthwatch_pass@localhost:5432/healthwatch_db
REDIS_URL=redis://localhost:6379
SECRET_KEY=your-secret-key-here
ALERT_THRESHOLD_HR_LOW=40
ALERT_THRESHOLD_HR_HIGH=130
ALERT_THRESHOLD_SPO2_LOW=88
ALERT_THRESHOLD_TEMP_HIGH=38.5
EOF

# Initialize database
python run_simulation.py --mode init

# Train ML models
python run_simulation.py --mode train

# Start backend
uvicorn main:app --reload --host 0.0.0.0 --port 8000
```

### 4. Frontend Setup

```bash
cd frontend

# Install dependencies
npm install

# Create .env file
echo "REACT_APP_API_URL=http://localhost:8000" > .env

# Start frontend
npm start
```

### 5. Run Simulation

```bash
cd backend
python run_simulation.py --mode simulate --user_id 1 --duration 60
```

