<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthWatch AI - Complete Project Workflow</title>
    <style>
        @page {
            size: A4;
            margin: 2cm;
        }
        
        @media print {
            body {
                margin: 0;
                padding: 0;
            }
            
            .page-break {
                page-break-after: always;
            }
            
            h1, h2, h3 {
                page-break-after: avoid;
            }
            
            pre {
                page-break-inside: avoid;
            }
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 210mm;
            margin: 0 auto;
            padding: 20px;
            background: white;
        }
        
        .cover-page {
            text-align: center;
            padding: 100px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .cover-title {
            font-size: 48px;
            color: #1a237e;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .cover-subtitle {
            font-size: 28px;
            color: #3949ab;
            margin-bottom: 40px;
        }
        
        .cover-description {
            font-size: 18px;
            color: #5c6bc0;
            margin-bottom: 60px;
        }
        
        .metadata-table {
            margin: 40px auto;
            max-width: 600px;
            border-collapse: collapse;
        }
        
        .metadata-table th {
            background-color: #e8eaf6;
            color: #1a237e;
            padding: 12px;
            text-align: left;
            font-weight: bold;
            border: 1px solid #c5cae9;
        }
        
        .metadata-table td {
            padding: 12px;
            border: 1px solid #e0e0e0;
        }
        
        h1 {
            color: #1a237e;
            font-size: 28px;
            border-bottom: 3px solid #3949ab;
            padding-bottom: 10px;
            margin-top: 40px;
            margin-bottom: 20px;
        }
        
        h2 {
            color: #283593;
            font-size: 22px;
            border-bottom: 2px solid #5c6bc0;
            padding-bottom: 8px;
            margin-top: 30px;
            margin-bottom: 15px;
        }
        
        h3 {
            color: #3949ab;
            font-size: 18px;
            margin-top: 25px;
            margin-bottom: 12px;
        }
        
        h4 {
            color: #5c6bc0;
            font-size: 16px;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        
        p {
            margin: 10px 0;
            text-align: justify;
        }
        
        ul, ol {
            margin: 15px 0;
            padding-left: 30px;
        }
        
        li {
            margin: 8px 0;
        }
        
        code {
            background-color: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 90%;
            color: #d32f2f;
        }
        
        pre {
            background-color: #f5f5f5;
            border: 1px solid #ddd;
            border-left: 4px solid #3949ab;
            padding: 15px;
            overflow-x: auto;
            border-radius: 4px;
            margin: 20px 0;
        }
        
        pre code {
            background-color: transparent;
            padding: 0;
            color: #333;
            font-size: 13px;
            line-height: 1.5;
        }
        
        hr {
            border: none;
            border-top: 2px solid #9fa8da;
            margin: 30px 0;
        }
        
        strong {
            color: #1a237e;
            font-weight: 600;
        }
        
        a {
            color: #3949ab;
            text-decoration: none;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 20px 0;
        }
        
        th {
            background-color: #e8eaf6;
            color: #1a237e;
            font-weight: bold;
            padding: 12px;
            text-align: left;
            border: 1px solid #c5cae9;
        }
        
        td {
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
        }
        
        tr:nth-child(even) {
            background-color: #fafafa;
        }
        
        blockquote {
            border-left: 4px solid #3949ab;
            padding-left: 20px;
            margin: 20px 0;
            color: #555;
            font-style: italic;
        }
        
        .print-button {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 30px;
            background-color: #3949ab;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        
        .print-button:hover {
            background-color: #283593;
        }
        
        @media print {
            .print-button {
                display: none;
            }
        }
    </style>
</head>
<body>
    <button class="print-button" onclick="window.print()">📄 Save as PDF</button>
    
    <div class="cover-page page-break">
        <div class="cover-title">🏥 HealthWatch AI</div>
        <div class="cover-subtitle">Complete Project Workflow</div>
        <div class="cover-description">Digital Twin for Hospital Records</div>
        
        <table class="metadata-table">
            <tr>
                <th>Project Name</th>
                <td>HealthWatch AI - Digital Twin System</td>
            </tr>
            <tr>
                <th>Document Type</th>
                <td>Complete Project Workflow</td>
            </tr>
            <tr>
                <th>Version</th>
                <td>1.0.0</td>
            </tr>
            <tr>
                <th>Date</th>
                <td>December 29, 2025</td>
            </tr>
            <tr>
                <th>Status</th>
                <td>Production Ready</td>
            </tr>
        </table>
    </div>
    
    <div id="content">
        <!-- Content will be loaded here -->
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Load and convert markdown
        fetch('PROJECT_WORKFLOW.md')
            .then(response => response.text())
            .then(markdown => {
                const html = marked.parse(markdown);
                document.getElementById('content').innerHTML = html;
            })
            .catch(error => {
                console.error('Error loading markdown:', error);
                document.getElementById('content').innerHTML = '<p>Error loading content. Please ensure PROJECT_WORKFLOW.md is in the same directory.</p>';
            });
    </script>
</body>
</html>
